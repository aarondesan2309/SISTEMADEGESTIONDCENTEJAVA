server.servlet.context-path=/sgdc-udefa

# ============================================
# CONFIGURACIÓN PENDIENTE — DATOS DEL CIEFAM
# Completar cuando se asigne la VM institucional
# ============================================

# IP del servidor (pendiente de asignación)
# spring.datasource.url=jdbc:postgresql://IP_SERVIDOR_AQUI:5432/sgdc_db

# Descomentar y completar cuando se tenga la IP:
# spring.datasource.username=USUARIO_BD_AQUI
# spring.datasource.password=PASSWORD_BD_AQUI

# Configuración local para desarrollo y pruebas
spring.datasource.url=jdbc:postgresql://localhost:5432/gestion_docente_emi
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

server.port=8091

# Soporte para subida de archivos (fotos, cedulas, expedientes)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Encoding UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Desactivar Hibernate DDL (solo usamos JdbcTemplate)
spring.jpa.hibernate.ddl-auto=none

# JWT
sgdc.jwt.secret=cambia-esta-clave-secreta-en-produccion

# Rutas de almacenamiento
sgdc.storage.fotos=C:/temp/gestion-docente-web/fotos/
sgdc.storage.cedulas=C:/temp/gestion-docente-web/cedulas/
sgdc.storage.expedientes=C:/temp/gestion-docente-web/expedientes/
sgdc.storage.contrato-template=C:/temp/gestion-docente-web/MAR-AGO26 (2).docx
